<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quản lý tài khoản</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-user">
            <img src="https://via.placeholder.com/150" alt="Avatar" class="sidebar-avatar" id="sidebarAvatar">
            <div class="sidebar-user-info">
                <h3 id="sidebarName">Công dân Xanh</h3>
                <p>Tiến Thắng, Mê Linh</p>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>

        <nav class="sidebar-nav" id="sidebarNav">
            <button class="nav-item active" data-target="tab-profile">
                <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Hồ sơ cá nhân
            </button>
            <button class="nav-item" data-target="tab-reports">
                <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Lịch sử Báo cáo
            </button>
            <div class="nav-divider"></div>
            <button class="nav-item" id="btnBack">
                <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Quay lại Bản đồ
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-header">
            <div class="breadcrumb">
                <span class="back-text" id="headerBack">&larr; Quay lại</span>
                <span class="next-text">Chi tiết &rarr;</span>
            </div>
        </header>

        <!-- Tab: Hồ sơ cá nhân -->
        <section class="content-card active-tab" id="tab-profile">
            <div class="card-grid">
                
                <!-- Cột trái: Ảnh đại diện -->
                <div class="profile-photo-col">
                    <h2 class="section-title">Ảnh đại diện</h2>
                    <div class="avatar-large-container">
                        <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar-large" id="profileAvatar">
                        <input type="file" id="avatarInput" accept="image/*" hidden>
                        <button class="btn-upload" id="btnUploadAvatar">Đổi ảnh</button>
                    </div>
                </div>

                <!-- Cột giữa & phải: Thông tin chi tiết -->
                <div class="profile-details-col">
                    <div class="details-header">
                        <h2 class="section-title">Personal Details</h2>
                        <button class="btn-pill btn-primary" id="btnSaveProfile">Lưu thay đổi</button>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Họ và Tên</label>
                            <input type="text" id="inputName" class="form-input" placeholder="Nhập họ tên...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" id="inputPhone" class="form-input" placeholder="Nhập số điện thoại...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="inputEmail" class="form-input" placeholder="Nhập email...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Vai trò</label>
                            <div class="tier-indicator">
                                <span class="tier-dot active"></span> Công dân
                                <span class="badge">Current</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- Tab: Lịch sử báo cáo -->
        <section class="content-card hidden-tab" id="tab-reports">
            <h2 class="section-title" style="margin-bottom: 1.5rem;">Submitted Reports</h2>
            
            <div class="reports-grid" id="reportsList">
                <!-- Javascript will render report cards here -->
            </div>
        </section>

    </main>

    <!-- Lightbox cho ảnh -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img class="lightbox-content" id="lightboxImg">
    </div>

    <script src="account.js"></script>
</body>
</html>
