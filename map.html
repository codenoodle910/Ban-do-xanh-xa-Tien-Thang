<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ - Xã Tiến Thắng, Mê Linh, Hà Nội</title>
    <meta name="description" content="Bản đồ địa lý xã Tiến Thắng, huyện Mê Linh, thành phố Hà Nội">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Mapbox GL CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
    <div id="app-container">


        <!-- Map Container -->
        <main class="map-wrapper" id="map-wrapper">
            <div id="map"></div>
            
            <!-- Location Picker UI (Hidden by default) -->
            <div id="location-picker-crosshair" class="hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: 10; pointer-events: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="var(--primary)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path><circle cx="12" cy="10" r="3" fill="white"></circle></svg>
            </div>
            <div id="location-picker-panel" class="hidden" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(255,255,255,0.95); padding: 1rem 1.5rem; border-radius: 100px; box-shadow: var(--shadow-xl); display: flex; align-items: center; gap: 1rem; backdrop-filter: blur(10px);">
                <span style="font-weight: 600; font-size: 0.95rem;">Kéo bản đồ để chọn vị trí</span>
                <button id="btn-confirm-location" class="btn btn-primary" style="padding: 0.5rem 1.5rem; border-radius: 100px;">Xác nhận</button>
            </div>
            
            <!-- Role Switcher -->
            <div class="role-switcher" id="role-switcher" style="display: none;">
                <span id="role-label-user" class="role-label user active">Người dân</span>
                <label class="switch">
                    <input type="checkbox" id="role-toggle">
                    <span class="slider round"></span>
                </label>
                <span id="role-label-admin" class="role-label admin">Admin</span>
            </div>

            <!-- Admin Instruction Panel -->
            <div id="admin-instruction-panel" class="admin-instruction-panel hidden">
                <span id="admin-instruction-text">Nhấp vào bản đồ để chọn Điểm Bắt Đầu (Điểm A)</span>
                <button id="btn-admin-cancel" class="btn btn-secondary" style="padding: 4px 12px; font-size: 0.75rem;">Hủy</button>
            </div>

            <!-- Road Color Picker Popup (Hidden) -->
            <div id="road-color-picker" class="road-color-picker hidden">
                <h4>Đánh giá mặt đường</h4>
                <div class="color-options">
                    <button class="color-btn btn-green" data-color="#10B981">Sạch sẽ</button>
                    <button class="color-btn btn-yellow" data-color="#F59E0B">Hơi bẩn</button>
                    <button class="color-btn btn-red" data-color="#EF4444">Rất bẩn</button>
                </div>
                <button id="btn-delete-road" class="btn-delete hidden" style="margin-top: 8px; width: 100%;">Xóa đánh giá</button>
            </div>
            
            <!-- Map Overlay Controls (Top Right) -->
            <div class="map-controls-top-right" id="map-controls-panel">
                <div class="panel-header" id="panel-toggle">
                    <span class="control-label" style="margin:0; font-size: 0.85rem; font-weight: 600;">Bảng điều khiển</span>
                    <button class="toggle-btn" aria-label="Đóng/Mở bảng điều khiển">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron-icon"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    </button>
                </div>
                <div class="panel-content" id="panel-content">
                    <div class="control-group">
                        <label class="control-label" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); display:block; margin-bottom: 0.5rem;">Kiểu bản đồ</label>
                    <div class="style-switcher" id="style-switcher">
                        <button class="style-btn active" data-style="mapbox://styles/mapbox/streets-v12">
                            <div class="style-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
                            </div>
                            <div class="style-info">
                                <span class="style-title">Bản đồ Màu</span>
                                <span class="style-desc">Giao diện mặc định</span>
                            </div>
                        </button>
                        <button class="style-btn" data-style="mapbox://styles/mapbox/outdoors-v12">
                            <div class="style-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                            </div>
                            <div class="style-info">
                                <span class="style-title">Đường phố</span>
                                <span class="style-desc">Giao diện địa hình OSM</span>
                            </div>
                        </button>
                        <button class="style-btn" data-style="mapbox://styles/mapbox/satellite-streets-v12">
                            <div class="style-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M16.2 7.8l-2 6.3-6.4 2.1 2-6.3z"></path></svg>
                            </div>
                            <div class="style-info">
                                <span class="style-title">Vệ tinh</span>
                                <span class="style-desc">Ảnh chụp từ vệ tinh</span>
                            </div>
                        </button>
                    </div>
                </div>
                <div class="control-separator" style="height: 1px; background: var(--border-color); margin: 0.5rem 0;"></div>
                <div class="control-group">
                    <label class="checkbox-container" style="font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="toggle-boundary" checked>
                        Hiện ranh giới
                    </label>
                </div>
                </div> <!-- End panel-content -->
            </div>
            
            <!-- Map Overlay Controls -->
            <div class="map-controls">
                <button id="btn-guide" class="control-btn" title="Hướng dẫn" onclick="window.location.href='guide.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </button>
                <button id="btn-home" class="control-btn" title="Trang chủ" onclick="window.location.href='index.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </button>
                <button id="btn-report" class="control-btn btn-report" title="Báo cáo tình hình">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                </button>
                <button id="btn-reset" class="control-btn" title="Khôi phục góc nhìn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
                <button id="btn-account" class="control-btn" title="Quản lý Tài khoản" onclick="window.location.href='account.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </button>
            </div>
            
            <!-- Loading Overlay -->
            <div id="loading-overlay" class="loading-overlay">
                <div class="spinner"></div>
                <p>Đang tải dữ liệu bản đồ...</p>
            </div>
            
            <!-- Report Modal -->
            <div id="report-modal" class="modal-overlay hidden">
                <div class="modal-container">
                    <div class="modal-header">
                        <h2>Báo cáo Tình hình</h2>
                        <button id="close-modal-btn" class="icon-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="location-status-container" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <div class="location-status" id="location-status" style="margin-bottom: 0;">
                                <span class="spinner-small"></span> Đang lấy vị trí hiện tại...
                            </div>
                            <button id="btn-pick-location" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.85rem;" disabled>
                                📍 Chọn vị trí
                            </button>
                        </div>
                        <div class="form-group">
                            <label>Hình ảnh sự cố</label>
                            <div class="image-upload-area" id="image-upload-area">
                                <input type="file" id="report-image" accept="image/*" capture="environment" multiple class="hidden">
                                <div class="upload-placeholder" id="upload-placeholder">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                                    <span>Bấm để chụp hoặc chọn nhiều ảnh</span>
                                </div>
                                <div id="image-preview-container" class="image-preview-container hidden"></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="report-desc">Mô tả chi tiết</label>
                            <textarea id="report-desc" rows="4" placeholder="Nhập mô tả tình hình tại vị trí này..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="btn-cancel-report" class="btn btn-secondary">Hủy</button>
                        <button id="btn-submit-report" class="btn btn-primary" disabled>Gửi Báo Cáo</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox-modal" class="lightbox">
        <button id="lightbox-close" class="lightbox-close">&times;</button>
        <button id="lightbox-prev" class="lightbox-nav lightbox-prev">&#10094;</button>
        <img id="lightbox-img" class="lightbox-content" src="" alt="Full size">
        <button id="lightbox-next" class="lightbox-nav lightbox-next">&#10095;</button>
        <div id="lightbox-counter" class="lightbox-counter">1 / 1</div>
    </div>

    <!-- Mapbox GL JS -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <!-- Mapbox GL Language Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/@mapbox/mapbox-gl-language@1.0.1/index.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
